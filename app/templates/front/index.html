{% extends 'front/layout.html' %} {% block title %}Panel de Automatizaciones{%
endblock %} {% block body %} {% for service in services %}
<div class="card">
  <h2>{{service.title}}</h2>
  <p>
    {{service.description}}
    <button
      data-url="{{ url_for('front_office.services', id=service.id) }}"
      onclick="window.location.href = this.getAttribute('data-url')"
    >
      Seleccionar
    </button>
  </p>
</div>
{% endfor %} {% endblock %}
